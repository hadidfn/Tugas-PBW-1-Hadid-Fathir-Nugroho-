<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard UT-Daerah</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; background-color: #f8f9fa; }
        
        .sidebar { width: 280px; background-color: #003366; color: white; height: 100vh; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #1a4d80; padding-bottom: 10px; }
        
        .nav-menu { list-style: none; padding: 0; }
        .nav-item { margin: 5px 0; }
        .nav-link { color: #d1d8e0; text-decoration: none; display: block; padding: 12px; border-radius: 5px; transition: 0.3s; }
        .nav-link:hover { background-color: #1a4d80; color: white; }

        .sub-menu { list-style: none; padding-left: 20px; margin-top: 5px; }
        .sub-link { font-size: 0.9rem; color: #a5b1c2; text-decoration: none; display: block; padding: 8px; transition: 0.2s; }
        .sub-link:hover { color: white; }
        
        .main-content { flex-grow: 1; padding: 40px; }
        .greeting-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #greeting { color: #003366; margin-top: 0; }
        .prodi-text { color: #555; font-style: italic; margin-top: -10px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>UT-Daerah Logistics</h2>
    <ul class="nav-menu">
        <li class="nav-item"><a href="stok.html" class="nav-link">Informasi Bahan Ajar</a></li>
        <li class="nav-item"><a href="tracking.html" class="nav-link">Tracking Pengiriman</a></li>
        
        <li class="nav-item">
            <span class="nav-link" style="cursor: default; font-weight: bold; color: white;">Laporan</span>
            <ul class="sub-menu">
                <li><a href="#" class="sub-link">• Monitoring Progress DO</a></li>
                <li><a href="#" class="sub-link">• Rekap Bahan Ajar</a></li>
            </ul>
        </li>

        <li class="nav-item"><a href="#" class="nav-link">Histori Transaksi</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="greeting-card">
        <h1 id="greeting">Memuat...</h1>
        <p>Halo, <strong>Hadid Fathir Nugroho</strong>.</p>
        <p>Selamat datang di sistem pengelolaan bahan ajar Universitas Terbuka.</p>
    </div>
</div>

<script>
    function updateGreeting() {
        const now = new Date();
        const hours = now.getHours();
        let message = "";

        if (hours >= 5 && hours < 11) {
            message = "Selamat Pagi";
        } else if (hours >= 11 && hours < 15) {
            message = "Selamat Siang";
        } else if (hours >= 15 && hours < 18) {
            message = "Selamat Sore";
        } else {
            message = "Selamat Malam";
        }

        document.getElementById('greeting').innerText = message + "!";
    }

    updateGreeting();
</script>

</body>
</html>
