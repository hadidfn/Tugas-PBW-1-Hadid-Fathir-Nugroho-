<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Pemesanan Bahan Ajar UT</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #003366; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .links { margin-top: 15px; font-size: 0.8rem; text-align: center; }
        .links a { color: blue; cursor: pointer; text-decoration: underline; margin: 0 5px; }
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 50%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="text-align: center; color: #003366;">UT-Logistics</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <div id="error-msg" style="
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 2px; 
    margin-top: 15px; 
    color: red; 
    width: 100%;
"></div>
    <div class="links">
        <a onclick="showModal('Lupa Password')">Lupa Password</a>
        <a onclick="showModal('Pendaftaran')">Daftar</a>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p>Fitur ini sedang dalam pengembangan.</p>
        <button onclick="closeModal()">Tutup</button>
    </div>
</div>

<script>
    function handleLogin() {
    const emailInput = document.getElementById('email').value;
    const passwordInput = document.getElementById('password').value;

    if (emailInput === "Hadid@gmail.com" && passwordInput === "12345") {
        alert("Selamat datang kembali, Hadid Fathir Nugroho!");
        window.location.href = "dashboard.html";
    } 
    else {
        const errorArea = document.getElementById('error-msg');
        errorArea.innerHTML = `<img src="asset/x.png" width="30"> email/password salah!`;
    }
}

</script>
</body>
</html>
